[defaults]
inventory        = inventories/prod
remote_user      = bpatsch
roles_path       = roles
host_key_checking = False
pipelining       = True
retry_files_enabled = False
stdout_callback  = ansible.builtin.default
result_format    = yaml
fact_caching     = memory

vault_identity_list = prod@scripts/vault-secret-client.sh, test@scripts/vault-secret-client.sh

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[inventory]
enable_plugins = yaml, ini, host_list, script
