{{ ansible_managed | comment }}

# Minimum OpenVPN server config
# - copied from  /usr/share/doc/openvpn/examples/sample-config-files/server.conf
#   from a Debian 12 (Bookworm) system

port {{ openvpn_port }}
proto {{ openvpn_proto }}
dev tun

ca keys/ca.crt
cert keys/server.crt
key keys/server.key          # This file should be kept secret
dh keys/dh2048.pem
tls-auth keys/ta.key 0       # This file is secret

server {{ openvpn_network_addr }} {{ openvpn_network_mask }}
ifconfig-pool-persist ipp.txt

# introduces /1 routes to bypass default route
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 1.0.0.1"
push "dhcp-option DNS 1.1.1.1"
push "dhcp-option DNS 8.8.8.8"
push "dhcp-option DNS 8.8.4.4"

client-to-client
keepalive 10 120

tls-server
compress lzo


auth SHA256
cipher AES-256-GCM
data-ciphers AES-256-GCM:AES-256-CBC
tls-version-min 1.2
tls-cipher TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA384:TLS-DHE-RSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-ECDSA-WITH-AES-256-CBC-SHA384:TLS-ECDHE-RSA-WITH-AES-256-CBC-SHA384:TLS-DHE-RSA-WITH-AES-256-CBC-SHA256

user nobody
group nogroup
persist-key
persist-tun
status /run/openvpn-status.log 1
status-version 3
log-append /var/log/openvpn.log
verb 3
explicit-exit-notify 1
{% if openvpn_use_updown_scripts %}
up "/etc/openvpn/up.sh br0"
down "/etc/openvpn/down.sh br0"
{% endif %}
script-security 3

topology subnet

management 127.0.0.1 7505



{% for network in openvpn_networks %}
# route {{ network }}
push "route {{ network }}"
{% endfor %}

{% for dns in openvpn_push_dns %}
push "dhcp-option DNS {{ dns }}"
{% endfor %}

{% for domain in openvpn_domains %}
push "dhcp-option DOMAIN {{ domain }}"
{% endfor %}
