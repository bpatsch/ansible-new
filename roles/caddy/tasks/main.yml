---
- name: Install Caddy apt transport prerequisites
  ansible.builtin.package:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present

- name: Add Caddy GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /tmp/caddy-gpg.key
    mode: "0644"

- name: Dearmor Caddy GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /tmp/caddy-gpg.key
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

- name: Add Caddy apt repository
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
    dest: /etc/apt/sources.list.d/caddy-stable.list
    mode: "0644"

- name: Install Caddy
  ansible.builtin.package:
    name: caddy
    state: present
    update_cache: true

- name: Create Caddy sites directory
  ansible.builtin.file:
    path: /etc/caddy/sites
    state: directory
    mode: "0755"

- name: Deploy top-level Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
  notify: Reload Caddy

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
